name : Run Rest Assured Testcases

run:
  on:
    push:
      branches: [ "main" ]

jobs:
  test:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-java@v3
        with:
            distribution: 'temurin'
            java-version: "17"
            cache: maven
      - run: mvn clean test

